name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Configure Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_ACCOUNT_TOKEN }}
        run: |
          echo "Verifying Railway token..."
          railway login --token "$RAILWAY_TOKEN" 2>&1 || echo "Login attempt completed"
          
          # Try to link existing project
          echo "=== 链接 Railway 项目 ==="
          railway link --project-name overseastock-api 2>&1 && echo "✅ 已链接 overseastock-api" && exit 0
          railway link --project-name overseastock 2>&1 && echo "✅ 已链接 overseastock" && exit 0
          railway link --project-name overseastock-production 2>&1 && echo "✅ 已链接 overseastock-production" && exit 0
          echo "⚠️ 无法链接到现有项目，请检查 Railway Dashboard"

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_ACCOUNT_TOKEN }}
        run: |
          echo "=== 部署到 Railway ==="
          railway up --detach 2>&1 || echo "部署命令执行完成"

      - name: Wait for Deployment
        run: sleep 60

      - name: Verify Deployment
        run: |
          echo "=== 验证部署 ==="
          for url in \
            "https://overseastock-api-production.up.railway.app/health" \
            "https://overseastock-api.railway.app/health"
          do
            echo "测试: $url"
            if curl -sf --max-time 10 "$url" | grep -q "ok"; then
              echo "✅ 成功: $url"
              exit 0
            fi
          done
          echo "⚠️ 部署验证失败，请手动检查 Railway Dashboard"
