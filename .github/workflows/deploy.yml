name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Railway CLI
        uses: MadeByThePinsHub/setup-railway-cli-action@v0.1.0
        with:
          token: ${{ secrets.RAILWAY_ACCOUNT_TOKEN }}

      - name: Link Project
        run: |
          echo "=== 链接或创建项目 ==="
          cd ${{ github.workspace }}
          
          # 尝试链接现有项目
          railway link --project-name overseastock 2>&1 || \
          railway link --project-name overseastock-api 2>&1 || \
          railway link --project-name overseastock-production 2>&1 || {
            echo "链接现有项目失败，尝试创建新项目..."
            railway init --name overseastock-api --no-interactive 2>&1 || true
          }
          
          # 验证链接状态
          railway status 2>&1 || true
          railway whoami 2>&1 || true

      - name: Deploy to Railway
        run: |
          echo "=== 部署到 Railway ==="
          cd ${{ github.workspace }}
          
          # 设置环境变量
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> $GITHUB_ENV
          echo "NODE_ENV=production" >> $GITHUB_ENV
          
          # 执行部署
          railway up --detach 2>&1
          
          echo "=== 等待部署完成 ==="
          sleep 30
          
          echo "=== 查看部署状态 ==="
          railway status 2>&1 || true

      - name: Verify Deployment
        run: |
          echo "=== 验证部署 ==="
          
          # 尝试多个可能的 URL
          URLs=(
            "https://overseastock-api.up.railway.app"
            "https://overseastock-production.up.railway.app"
          )
          
          for url in "${URLs[@]}"; do
            echo "测试: $url"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 "$url/health" 2>/dev/null)
            echo "状态码: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ 部署成功: $url"
              echo "health: $(curl -s $url/health)"
              echo "api/products: $(curl -s $url/api/products | head -100)"
              break
            fi
          done