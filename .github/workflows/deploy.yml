name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Configure Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway link --token $RAILWAY_TOKEN

      - name: Deploy to Railway
        # DATABASE_URL 已通过 Railway Variables 页面配置，无需通过 GitHub Secret 传递
        run: railway up --detached

      - name: Wait and verify
        run: |
          echo "Waiting for deployment..."
          sleep 30
          curl -s https://overseastock-api.railway.app/health && echo ""
          echo "API check:"
          curl -s https://overseastock-api.railway.app/api/products | head -c 200
